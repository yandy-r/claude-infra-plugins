name: Lint

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --no-cache-dir ruff black
      - run: ./scripts/style.sh lint --python

  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned shellcheck
        # Use the same pinned version .tool-versions declares (resolve_shellcheck_bin
        # in scripts/lib/shellcheck-resolve.sh prefers <repo>/tools/shellcheck).
        # apt ships older shellcheck versions whose warnings diverge from the pin.
        run: ./scripts/install-shellcheck.sh
      - run: ./scripts/style.sh lint --shell

  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npx --yes markdownlint-cli "**/*.md" --ignore-path .markdownlintignore
      - run: npx --yes prettier --check "**/*.{md,mdx,json,jsonc,yaml,yml}"
